services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: user-demo-backend:latest
    container_name: user-demo-backend
    env_file:
      - .env
    environment:
      MYSQL_URL: ${MYSQL_URL}
      MYSQL_USERNAME: ${MYSQL_USERNAME}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:5173}
    ports:
      - "8080:8080"
    networks:
      - user-demo-net
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: user-demo-frontend:latest
    container_name: user-demo-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    networks:
      - user-demo-net
    restart: unless-stopped

networks:
  user-demo-net:
    driver: bridge
