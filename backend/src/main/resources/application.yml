server:
  port: 8080

spring:
  application:
    name: user-demo
  datasource:
    url: ${MYSQL_URL:jdbc:mysql://localhost:3306/user_demo?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
    show-sql: true

app:
  cors:
    allowed-origin: ${FRONTEND_ORIGIN:http://localhost:5173}
